# Solo Advertiser — Redis Configuration

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Security
# requirepass your_redis_password_here

# Performance
tcp-keepalive 300
timeout 0
databases 16
