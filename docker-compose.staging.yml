version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - admin
      - business
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file: .env.staging
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G

  admin:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        APP_NAME: admin-web
    environment:
      - NEXT_PUBLIC_API_URL=https://api.soloadvertiser.com
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  business:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        APP_NAME: business-web
    environment:
      - NEXT_PUBLIC_API_URL=https://api.soloadvertiser.com
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soloadvertiser_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata_staging:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M

volumes:
  pgdata_staging:
  redisdata_staging:
